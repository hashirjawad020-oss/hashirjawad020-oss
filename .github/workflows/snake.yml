name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ THIS WAS MISSING
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: hashirjawad020-oss
        outputs: |
          dist/github-contribution-grid-snake-dark.svg?color_snake=39FF14&color_dots=#000000,#001a12,#003d2b,#00c853,#7CFFCB
        with:
          add: "dist"
          message: "Generate contribution snake"
