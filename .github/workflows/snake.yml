name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: hashirjawad020-oss
          outputs: |
            dist/github-contribution-grid-snake-dark.svg

      - name: Push to repository
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "Generate contribution snake"
