name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate snake
        uses: Platane/snk@v3
        with:
          github_user_name: hashirjawad020-oss
         outputs: |
           dist/github-contribution-grid-snake-dark.svg?color_snake=FFFFFF&color_dots=#000000,#0a0a0a,#1a1a1a,#2a2a2a,#ffffff

      - name: Commit & push
        uses: EndBug/add-and-commit@v9
        with:
          add: "dist"
          message: "Generate contribution snake"
